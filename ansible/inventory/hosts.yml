all:
  hosts:
    SW-MEDICAL:
      ansible_host: 192.168.99.23
      ansible_user: admin
      ansible_password: admin123
      ansible_connection: ansible.netcommon.network_cli
      ansible_network_os: cisco.ios.ios
      ansible_network_cli_ssh_type: paramiko
      ansible_become: true
      ansible_become_method: enable
      ansible_become_password: admin123
      ansible_ssh_common_args: -o KexAlgorithms=+diffie-hellman-group1-sha1 -o HostKeyAlgorithms=+ssh-rsa
        -o PubkeyAcceptedAlgorithms=+ssh-rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
