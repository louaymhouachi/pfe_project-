! =========================================
! DEVICE: SW-CORE
! ROLE: SITE_CORE
! =========================================

! -------- VLAN CREATION --------
vlan 20
 name MEDICAL
!

! -------- INTER-VLAN ROUTING --------
ip routing
!

! -------- SVI / GATEWAY CONFIG --------
interface Vlan20
 description Gateway for MEDICAL
 ip address 192.168.20.33 255.255.255.224
 no shutdown
!

! -------- TRUNK CONFIG --------
interface GigabitEthernet0/2
 description Auto trunk
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan add 20
 no shutdown
!
interface GigabitEthernet0/3
 description Auto trunk
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan add 20
 no shutdown
!
interface GigabitEthernet1/0
 description Auto trunk
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan add 20
 no shutdown
!